<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>Human in the Loop – Minimalist</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<style>
  :root {
    --bg:#ffffff;   /* white */
    --header:#111111; /* nearly black */
    --hero:#27ae60;   /* fresh green */
    --accent:#27ae60; /* button */
    --link:#27ae60;  /* green links */
    --text:#222222;  /* dark gray */
  }
  body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
  header{background:var(--header);color:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
  header a{color:#fff;text-decoration:none;font-weight:bold;margin-left:1rem;}
  .hero{background:var(--hero);color:#fff;padding:4rem 2rem;text-align:center;}
  .cta{background:var(--accent);color:#fff;padding:.8rem 1.5rem;border:none;border-radius:4px;cursor:pointer;font-size:1rem;}
  a{color:var(--link);}
  .section{padding:2rem;max-width:900px;margin:auto;}
  footer{background:#333;color:#fff;padding:1rem 2rem;text-align:center;}
</style>
</head>
<body>
<header>
  <div><strong>Human in the Loop</strong></div>
  <nav>
    <a href='index.html'>Home</a>
    <a href='theme1.html'>Cool</a>
    <a href='theme2.html'>Warm</a>
  </nav>
</header>
<section class='hero'>
  <h1>Human oversight matters.</h1>
  <p>Minimalist look with clean white and a fresh green accent.</p>
  <button class='cta' onclick="location.href='index.html'">Back to Home</button>
</section>
<section class='section'>
  <h2>Explore the site</h2>
  <p>This is the <strong>Minimalist</strong> theme. All other pages use the same content but with different colors.</p>
</section>
<footer>© 2026 Human in the Loop – All rights reserved.</footer>
</body>
</html>
